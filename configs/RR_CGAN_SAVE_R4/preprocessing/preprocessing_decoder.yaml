preprocessing_decoder: 
  # order: [dict1, stabilization1, split1, add_history1, add_history2, tuple_out]
  # order: [nwb1, dict1, smooth, stabilization1, split1, add_history1, add_history2, tuple_out]
  # order: [dict1, stabilization1, split1, tuple_out]
  # After cgan, keys are neural_train / neural_test (not "neural"). PCA both before add_history → 40*9=360 for Ridge.
  order: [cgan, add_history1, add_history2, tuple_out]
  content:
    cgan:
      type: CycleGanBlock
      params:
        fpath: "results/cgan_r4/cgan_r4.pkl"
        cycleGAN_params:
          D_params:
            hidden_dim: 96
          G_params:
            hidden_dim: 96
          training_params:
            loss_type: 'L1'
            optim_type: 'Adam'
            epochs: 400
            batch_size: 256
            D_lr: 0.01
            G_lr: 0.001
            ID_loss_p: 5
            cycle_loss_p: 5
            drop_out_D: 0.2
            drop_out_G: 0.2   
          logs: True
          log_save_path: "results/cgan_r4/"
        train_test_split: 0.8
        neural_type: 'tcfr'
        verbose: True
        normalizer_path: "results/normalizers/cgan_norm_r4.pkl"
        nested_pipeline_config:
          order: [add_history1, cgan_out]
          content:
            add_history1:
              type: AddHistoryBlockRR
              params:
                location: ['neural', 'behaviour']
                seq_length: 8
            cgan_out:
              type: CycleGANOutputBlock
              params: {}
        is_optimized: False
        checkpoint_save_dir: "results/cgan_r4/checkpoints/"
    nwb1:
      type: LoadNWBBlock
      params: {}
    dict1:
      type: Dict2DataDictBlock
      params:
        neural_type: tcfr
    smooth:
      type: SmoothBlock
      params: {}
    split1:
      type: DataSplitBlock
      params:
        split_ratio: 0.8
        split_seed: -1
    add_history1:
      type: AddHistoryBlockRR
      params:
        location: ['neural_train', 'behaviour_train']
        seq_length: 8
    add_history2:
      type: AddHistoryBlockRR
      params:
        location: ['neural_test', 'behaviour_test']
        seq_length: 8
    # update_normalize_sequence:
    #   type: NormalizationBlock
    #   params:
    #     location: ['neural_train', 'neural_test']
    #     method: sklearn
    #     normalizer_params:
    #       type: StandardScaler
    #       is_IO: False
    #       is_save: False
    #       params: {}
    tuple_out:
      type: Dict2TupleBlock
      params: {}