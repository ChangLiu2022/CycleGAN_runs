preprocessing_decoder: 
  # order: [dict1, stabilization1, split1, add_history1, add_history2, tuple_out]
  order: [nwb1, dict1, smooth, stabilization1, split1, add_history1, normalize_sequence, tuple_out]
  #order: [nwb1, dict1, stabilization1, split1, tuple_out]

  # order: [dict1, stabilization1, split1, tuple_out]
  content:
    nwb1:
      type: LoadNWBBlock
      params: {}
    dict1:
      type: Dict2DataDictBlock
      params:
        neural_type: tcfr
    smooth:
      type: SmoothBlock
      params: {}
    split1:
      type: DataSplitBlock
      params:
        split_ratio: 0.8
        split_seed: -1
    add_history1:
      type: AddHistoryBlock
      params:
        location: ['neural_train', 'neural_test']
        seq_length: 20
    normalize_sequence:
      type: NormalizationBlock
      params:
        location: ['neural_train', 'neural_test']
        method: sequence_scaler
        normalizer_params:
          type: sequence_scaler
          is_IO: False
          is_save: False
          params: {}
    tuple_out:
      type: Dict2TupleBlock
      params: {}
    stabilization1:
      type: StabilizationBlock
      params:
        location: 'neural'
        stabilization_config:
          type: LatentSpaceAlignment
          params:
            # dim_red_method: 
            #   type: EMFactorAnalysis1
            #   params:
            #     verbose: True
            dim_red_method: 
              type: NoDimRed
              params: {}
            alignment_method: 
              type: NoAlignment
              params: {}
            fpath: "results/alignment_models/lstm_no_1.pkl"
            ndims: 40
    